<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>visitor@portfolio:~</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/terminal.css" />
  <link rel="stylesheet" href="css/markdown.css" />

  <!-- marked.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>

  <!-- Page backdrop glow -->
  <div class="backdrop"></div>

  <!-- Desktop: floating windows live here -->
  <div id="desktop"></div>

  <!-- Mobile tab bar (hidden on desktop) -->
  <div id="mobile-tab-bar"></div>

  <!-- ─── Terminal Window Template ──────────────────────────── -->
  <template id="terminal-window-template">
    <div class="terminal-window">

      <!-- Titlebar (drag handle) -->
      <div class="titlebar">
        <button class="dot dot-red" aria-label="Close window" title="Close"></button>
        <span class="titlebar-label">visitor@portfolio:~</span>
      </div>

      <!-- Terminal body -->
      <div class="terminal-body">

        <!-- Output area -->
        <div class="output" aria-live="polite" aria-label="Terminal output"></div>

        <!-- Input row -->
        <div class="input-row">
          <span class="prompt">visitor@portfolio:<span class="prompt-dir">~</span>$&nbsp;</span>
          <div class="input-wrapper">
            <input
              class="terminal-input"
              type="text"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              aria-label="Terminal input"
            />
            <span class="ghost-text"></span>
          </div>
        </div>

        <!-- Autocomplete suggestions -->
        <div class="autocomplete-list" hidden></div>

      </div>
    </div>
  </template>

  <!-- Scripts (order matters) -->
  <script src="js/filesystem.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/draggable.js"></script>
  <script src="js/autocomplete.js"></script>
  <script src="js/commands.js"></script>
  <script src="js/window-manager.js"></script>
  <script src="js/context-menu.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      WindowManager.createWindow();
      ContextMenu.init();
    });
  </script>

</body>
</html>
