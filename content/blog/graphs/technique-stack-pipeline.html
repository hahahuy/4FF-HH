<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parameter Golf — Technique Stack Pipeline</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --surface3: #2a2f48;
    --accent: #6c63ff; --accent2: #ff6b6b; --accent3: #43e97b; --accent4: #f7971e; --accent5: #38bdf8;
    --text: #e8eaf6; --muted: #8892b0; --border: #2d3250;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header { padding: 1.5rem 2rem 1rem; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p { color: var(--muted); margin-top: 0.3rem; font-size: 0.85rem; }
  .tag { display: inline-block; background: var(--accent); color: #fff; border-radius: 4px; font-size: 0.68rem; padding: 2px 7px; margin-left: 6px; vertical-align: middle; font-weight: 600; }

  .main { padding: 1.5rem 2rem; }

  /* Track tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 1.2rem; flex-wrap: wrap; align-items: center; }
  .tab {
    padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .tab.retired-tab.active { background: #2a1c2a; border-color: var(--accent2); color: var(--accent2); }
  .tab.retired-tab:hover:not(.active) { border-color: var(--accent2); color: var(--accent2); }
  .tab-sep { color: var(--border); font-size: 1.2rem; line-height: 1; padding: 0 4px; }

  /* Pipeline */
  .pipeline { display: flex; align-items: flex-start; gap: 0; overflow-x: auto; padding-bottom: 1rem; }
  .pipeline-step { display: flex; flex-direction: column; align-items: center; min-width: 196px; }
  .arrow { display: flex; align-items: center; padding-top: 46px; font-size: 1.5rem; color: var(--muted); flex-shrink: 0; padding-left: 3px; padding-right: 3px; }

  .step-card {
    width: 188px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--surface); overflow: hidden;
    transition: border-color 0.18s, transform 0.14s, box-shadow 0.18s;
    cursor: pointer;
  }
  .step-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(108,99,255,0.13); }
  .step-card.base-card  { border-color: var(--accent5); }
  .step-card.plan-d     { border-color: var(--accent3); }
  .step-card.plan-b     { border-color: var(--accent); }
  .step-card.target-card{ border-color: var(--accent5); cursor: default; }
  .step-card.retired-card { border-color: #3a2040; opacity: 0.65; }

  .card-header { padding: 9px 11px 5px; display: flex; justify-content: space-between; align-items: flex-start; }
  .card-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .card-bpb { font-size: 1.25rem; font-weight: 700; color: #fff; }
  .card-delta { font-size: 0.75rem; font-weight: 600; border-radius: 4px; padding: 2px 7px; }
  .card-delta.base-d  { background: rgba(56,189,248,0.13); color: var(--accent5); }
  .card-delta.pos     { background: rgba(67,233,123,0.13); color: var(--accent3); }
  .card-delta.big-pos { background: rgba(67,233,123,0.2); color: var(--accent3); }
  .card-delta.target-d{ background: rgba(56,189,248,0.13); color: var(--accent5); }
  .card-delta.retired-d{ background: rgba(255,107,107,0.1); color: var(--accent2); }

  .card-body { padding: 0 11px 9px; }
  .card-name { font-size: 0.83rem; font-weight: 600; color: #ccd; margin-bottom: 5px; }
  .tech-chips { display: flex; flex-wrap: wrap; gap: 3px; }
  .chip { font-size: 0.63rem; padding: 1px 5px; border-radius: 3px; font-weight: 500; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .chip.new { background: rgba(67,233,123,0.1); border-color: rgba(67,233,123,0.25); color: var(--accent3); }
  .chip.ret { background: rgba(255,107,107,0.07); border-color: rgba(255,107,107,0.2); color: var(--accent2); }

  /* Detail panel */
  .detail { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem 1.6rem; margin-top: 1.2rem; }
  .detail h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.9rem; }
  .detail-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media (max-width: 640px) { .detail-cols { grid-template-columns: 1fr; } }
  .detail-section h4 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin-bottom: 0.5rem; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .k { color: var(--muted); }
  .detail-row .v { font-weight: 600; color: #fff; }
  .detail-row .v.good { color: var(--accent3); }
  .detail-row .v.bad  { color: var(--accent2); }
  .detail-row .v.neutral { color: var(--muted); }
  .notes-box { background: var(--surface2); border-radius: 7px; padding: 0.8rem 0.9rem; font-size: 0.8rem; line-height: 1.6; color: #bbc; margin-top: 0.8rem; }

  /* Retired section */
  .retired-note { background: #1a1020; border: 1px solid #3a2040; border-radius: 8px; padding: 0.9rem 1.1rem; margin-bottom: 1rem; font-size: 0.82rem; color: #c8a0c8; line-height: 1.6; }
  .retired-note strong { color: var(--accent2); }

  /* Compat matrix */
  .compat-section { margin-top: 1.5rem; }
  .compat-section h2 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.8rem; color: #ccd; }
  .matrix { display: grid; grid-template-columns: 110px repeat(2, 70px); gap: 4px; }
  .matrix-cell { height: 44px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; }
  .matrix-label { background: transparent; color: var(--muted); justify-content: flex-end; padding-right: 8px; font-size: 0.76rem; }
  .matrix-header { background: var(--surface2); color: var(--accent5); font-size: 0.8rem; }
  .compat-yes  { background: rgba(67,233,123,0.1); color: var(--accent3); border: 1px solid rgba(67,233,123,0.2); }
  .compat-self { background: var(--surface2); color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>Technique Stack Pipeline <span class="tag">Interactive</span></h1>
  <p>Active plan stack (Plan D → B) · click any node for details · retired plans preserved as reference</p>
</header>

<div class="main">

  <div class="tabs">
    <div class="tab active" data-track="main">Main Stack</div>
    <div class="tab" data-track="d-only">Plan D Only</div>
    <div class="tab-sep">|</div>
    <div class="tab retired-tab" data-track="retired">Retired P1–P5 (historical)</div>
  </div>

  <div class="pipeline" id="pipeline"></div>

  <div class="detail" id="detail">
    <h3 id="detailTitle">Click any step to see details</h3>
    <div class="detail-cols">
      <div class="detail-section">
        <h4>Key numbers</h4>
        <div id="detailStats"></div>
      </div>
      <div class="detail-section">
        <h4>Techniques at this step</h4>
        <div id="detailTechs"></div>
      </div>
    </div>
    <div class="notes-box" id="detailNotes"></div>
  </div>

  <div class="compat-section">
    <h2>Plan compatibility — active plans</h2>
    <div class="matrix" id="compatMatrix"></div>
  </div>

</div>

<script>
const steps = {
  base: {
    label: "Base", name: "Merged SOTA (our base)", bpb: 1.1194, deltaStr: "base", cardCls: "base-card", deltaCls: "base-d",
    chips: ["11L", "LeakyReLU²", "TTT-3ep", "BigramHash(1536)", "Parallel-Muon", "int6-QAT", "MLP×3", "SmearGate", "SWA", "FP16"],
    newChips: [],
    stats: [
      { k: "val bpb (3-seed)", v: "1.1194", cls: "" },
      { k: "bpb std", v: "0.0006", cls: "good" },
      { k: "artifact", v: "15.75 MB", cls: "" },
      { k: "ms/step", v: "116 ms", cls: "" },
      { k: "quant scheme", v: "int6 MLP + int6 attn", cls: "" },
      { k: "record folder", v: "2026-03-23_LeakyReLU_LegalTTT_ParallelMuon", cls: "neutral" },
    ],
    techs: [
      { k: "LeakyReLU(0.5)² activation", v: "~−0.004", cls: "good" },
      { k: "Legal score-first TTT 3ep SGD", v: "~−0.008", cls: "good" },
      { k: "Parallel Muon optimizer", v: "faster conv.", cls: "good" },
      { k: "BigramHash(1536)", v: "in base", cls: "neutral" },
      { k: "int6 QAT (STE), MLP×3, SmearGate", v: "inherited", cls: "neutral" },
      { k: "SWA, OrthoInit, FP16 embed", v: "inherited", cls: "neutral" },
    ],
    notes: "Our current copy base. Already includes TTT, LeakyReLU², Parallel Muon — do not re-implement. Budget is tight at 15.75MB: Plan D's int5 MLP must free space before adding layers or expanding bigram.",
  },
  planD: {
    label: "Plan D", name: "Int5 MLP → space budget", bpb: 1.116, deltaStr: "~−0.003", cardCls: "plan-d", deltaCls: "pos",
    chips: ["int5-MLP", "BigramHash(1536→4096)", "or 11L→12L"],
    newChips: ["int5-MLP"],
    stats: [
      { k: "expected val bpb", v: "~1.116", cls: "good" },
      { k: "int5 MLP range", v: "[-16, 15]", cls: "" },
      { k: "space freed by int5", v: "~1.5 MB", cls: "good" },
      { k: "space allocation", v: "bigram expand OR +1 layer", cls: "" },
      { k: "artifact after D", v: "< 15.9 MB target", cls: "good" },
      { k: "TTT interaction", v: "verify TTT still fires", cls: "neutral" },
    ],
    techs: [
      { k: "quantize_int5_per_row()", v: "new function", cls: "" },
      { k: "MLP weights → int5 [-16,15]", v: "saves ~1.5 MB", cls: "good" },
      { k: "Attn weights stay int6", v: "unchanged", cls: "neutral" },
      { k: "BigramHash 1536→4096", v: "−0.001 est.", cls: "good" },
      { k: "mixed_quantize update", v: "branch on mlp/attn names", cls: "" },
    ],
    notes: "Low-risk. The key arithmetic: int5 MLP saves ~1.5MB vs int6. That space funds either a larger bigram table (1536→4096, −0.001) or a 12th layer. Check artifact < 15.9MB at smoke. Verify TTT dequant path still works after int5.",
  },
  planB: {
    label: "Plan B", name: "15L BI-guided recurrence", bpb: 1.110, deltaStr: "~−0.009", cardCls: "plan-b", deltaCls: "big-pos",
    chips: ["15L-recurrence", "layers-9-13-tied", "dedup-quant", "BI-guided"],
    newChips: ["depth-recurrence", "layer-map"],
    stats: [
      { k: "expected val bpb", v: "~1.110", cls: "good" },
      { k: "unique blocks", v: "11 (of 15 positions)", cls: "" },
      { k: "tied positions", v: "9, 10, 11, 12, 13 → block 9", cls: "" },
      { k: "step time gate", v: "≤ 130 ms (hard abort)", cls: "bad" },
      { k: "artifact", v: "< 16.0 MB (dedup saves)", cls: "good" },
      { k: "reference", v: "PR #857 @ 1.1093 bpb", cls: "" },
    ],
    techs: [
      { k: "NUM_LAYERS=15, TIE_LAYERS=9,10,11,12,13", v: "env vars", cls: "" },
      { k: "layer_map in GPT.__init__", v: "new", cls: "" },
      { k: "Dedup quant (store tied block once)", v: "saves ~4 blocks", cls: "good" },
      { k: "U-Net skip_weights resize", v: "15//2 = 7", cls: "" },
      { k: "BI scores: layers 9-13 most redundant", v: "BI 0.10–0.16", cls: "neutral" },
    ],
    notes: "CRITICAL GATE: smoke test must show step_avg ≤ 130ms. PR #857 measured 116ms on 8×H100 for this exact config. If smoke is slower, abort — the time budget will be violated. Dedup serialization: tied layers stored once in the artifact, with a small (<100 byte) reconstruction map.",
  },

  // ── Retired plans (historical) ──────────────────────────────
  retiredBase: {
    label: "Old Base", name: "#2 SmearGate", bpb: 1.1458, deltaStr: "retired", cardCls: "retired-card", deltaCls: "retired-d",
    chips: ["9L", "int6-QAT", "MLP×3", "SmearGate", "BigramHash(4096)", "SWA", "Muon-WD"],
    newChips: [],
    stats: [
      { k: "val bpb", v: "1.1458", cls: "" },
      { k: "retired", v: "2026-03-26", cls: "bad" },
      { k: "reason", v: "Leaderboard moved to 1.1194", cls: "bad" },
    ],
    techs: [],
    notes: "Retired 2026-03-26. Plans P1–P5 were built off this base. Leaderboard advanced to 1.1194 before we had results, making the targets (~1.137) too conservative to compete. Preserved as historical reference.",
  },
  p1: {
    label: "P1 (retired)", name: "Int5 MLP + 10 Layers", bpb: 1.1428, deltaStr: "superseded", cardCls: "retired-card", deltaCls: "retired-d",
    chips: ["int5-MLP", "10L"],
    newChips: [],
    stats: [{ k: "target was", v: "~1.1428", cls: "" }, { k: "technique", v: "absorbed into Plan D", cls: "neutral" }],
    techs: [],
    notes: "Technique is still valid — int5 MLP is Plan D's core idea. But the target bpb (1.1428) is now above our base (1.1194). Partial work: 2026-03-23_P1_Int5_10L.",
  },
  p2: {
    label: "P2 (retired)", name: "BigramHash(10240) + Trigram", bpb: 1.1388, deltaStr: "superseded", cardCls: "retired-card", deltaCls: "retired-d",
    chips: ["bigram-10k", "trigram"],
    newChips: [],
    stats: [{ k: "target was", v: "~1.1388", cls: "" }, { k: "bigram in new base", v: "1536 (re-tune in D)", cls: "neutral" }],
    techs: [],
    notes: "Bigram expansion is still in Plan D but at a different size. Trigram not pursued — artifact budget risk without proven benefit.",
  },
  p4: {
    label: "P4 (retired)", name: "QAT int5 + SWA retune", bpb: 1.1368, deltaStr: "superseded", cardCls: "retired-card", deltaCls: "retired-d",
    chips: ["qat-int5", "swa-0.4"],
    newChips: [],
    stats: [{ k: "target was", v: "~1.1368", cls: "" }],
    techs: [],
    notes: "STE int5 QAT is built into Plan D. SWA fraction tuning available via env var in the new base. Superseded.",
  },
  p5: {
    label: "P5 (retired)", name: "seq_len 4096", bpb: 1.1348, deltaStr: "superseded", cardCls: "retired-card", deltaCls: "retired-d",
    chips: ["seq=4096"],
    newChips: [],
    stats: [{ k: "target was", v: "~1.1348", cls: "" }],
    techs: [],
    notes: "Possible addendum to Plan B if step budget allows. Step time on 15L recurrence at 4096 seq needs measurement first.",
  },
};

const tracks = {
  main:    ['base', 'planD', 'planB'],
  'd-only':['base', 'planD'],
  retired: ['retiredBase', 'p1', 'p2', 'p4', 'p5'],
};

const targets = {
  main: '≤1.109 bpb',
  'D-only': '≤1.116 bpb',
  retired: '(retired — targets superseded)',
};

let currentTrack = 'main';

function renderPipeline(track) {
  const el = document.getElementById('pipeline');
  el.innerHTML = '';
  const ids = tracks[track];
  ids.forEach((sid, i) => {
    const s = steps[sid];
    const stepEl = document.createElement('div');
    stepEl.className = 'pipeline-step';
    const card = document.createElement('div');
    card.className = `step-card ${s.cardCls}`;
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-label">${s.label}</div>
          <div class="card-bpb">${s.bpb.toFixed(4)}</div>
        </div>
        <div class="card-delta ${s.deltaCls}">${s.deltaStr}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="tech-chips">
          ${s.chips.map(c => `<span class="chip ${s.newChips.includes(c) ? 'new' : (s.cardCls === 'retired-card' ? 'ret' : '')}">${c}</span>`).join('')}
        </div>
      </div>
    `;
    card.addEventListener('click', () => showDetail(sid));
    stepEl.appendChild(card);
    el.appendChild(stepEl);
    if (i < ids.length - 1) {
      const arr = document.createElement('div');
      arr.className = 'arrow';
      arr.textContent = '→';
      el.appendChild(arr);
    }
  });

  // Target card (only for active tracks)
  if (track !== 'retired') {
    const tgt = targets[track] || '≤1.109 bpb';
    const arr2 = document.createElement('div');
    arr2.className = 'arrow';
    arr2.textContent = '→';
    const tgtStep = document.createElement('div');
    tgtStep.className = 'pipeline-step';
    tgtStep.innerHTML = `
      <div class="step-card target-card" style="cursor:default">
        <div class="card-header">
          <div><div class="card-label">Target</div><div class="card-bpb" style="font-size:1rem">${tgt}</div></div>
          <div class="card-delta target-d">goal</div>
        </div>
        <div class="card-body"><div class="card-name">Beat PR #857 (1.1048)</div></div>
      </div>
    `;
    el.appendChild(arr2);
    el.appendChild(tgtStep);
  }
}

function showDetail(sid) {
  const s = steps[sid];
  document.getElementById('detailTitle').textContent = `${s.label}: ${s.name}`;
  document.getElementById('detailStats').innerHTML = s.stats.map(r =>
    `<div class="detail-row"><span class="k">${r.k}</span><span class="v ${r.cls}">${r.v}</span></div>`
  ).join('');
  document.getElementById('detailTechs').innerHTML = s.techs.length
    ? s.techs.map(r => `<div class="detail-row"><span class="k">${r.k}</span><span class="v ${r.cls}">${r.v}</span></div>`).join('')
    : '<div class="detail-row"><span class="k" style="font-style:italic">Historical entry — see notes</span></div>';
  document.getElementById('detailNotes').textContent = s.notes;
}

// Compat matrix (active plans only)
function renderCompat() {
  const plans = ['Plan D', 'Plan B'];
  const matrix = [['self','yes'],['yes','self']];
  const m = document.getElementById('compatMatrix');
  m.innerHTML = `<div class="matrix-cell matrix-label"></div>`;
  plans.forEach(p => { m.innerHTML += `<div class="matrix-cell matrix-header">${p}</div>`; });
  matrix.forEach((row, ri) => {
    m.innerHTML += `<div class="matrix-cell matrix-label">${plans[ri]}</div>`;
    row.forEach(v => {
      const cls = v === 'self' ? 'compat-self' : 'compat-yes';
      m.innerHTML += `<div class="matrix-cell ${cls}">${v === 'self' ? '—' : '✓'}</div>`;
    });
  });
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTrack = tab.dataset.track;
    renderPipeline(currentTrack);
    const firstId = tracks[currentTrack][0];
    if (firstId) showDetail(firstId);
    // Show/hide retired note
    const retNote = document.getElementById('retiredNote');
    retNote.style.display = currentTrack === 'retired' ? 'block' : 'none';
  });
});

// Retired note (hidden by default)
const detailEl = document.getElementById('detail');
const retiredNote = document.createElement('div');
retiredNote.id = 'retiredNote';
retiredNote.className = 'retired-note';
retiredNote.style.display = 'none';
retiredNote.innerHTML = '<strong>Retired 2026-03-26.</strong> Plans P1–P5 targeted improvements off the #2 SmearGate base (1.1458). The leaderboard advanced to 1.1194 before we had Gate 3 results, making those targets too conservative. Techniques from P1 (int5 MLP) and P4 (QAT retune) were absorbed into Plan D. P2 (bigram) updated for the new base. P5 (seq 4096) remains as a possible addendum to Plan B.';
document.querySelector('.main').insertBefore(retiredNote, detailEl);

renderPipeline('main');
showDetail('base');
renderCompat();
</script>
</body>
</html>
